<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THE FOUNDER: BUSINESS STRATEGY</title>
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f1d592;
            --gold-glow: rgba(212, 175, 55, 0.4);
            --dark-bg: #05070a;
            --panel-bg: rgba(10, 15, 25, 0.95);
            --text-main: #e0e6ed;
            --accent-blue: #007aff;
            --danger: #ff3b30;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--dark-bg);
            color: var(--text-main);
        }

        /* 遊戲場景主容器 */
        #game-stage {
            position: relative;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 30%, #1a253a 0%, #05070a 100%);
            display: flex;
            flex-direction: column;
        }

        /* 氛圍裝飾層：科技感掃描線與噪點 */
        #game-stage::after {
            content: "";
            position: absolute;
            inset: 0;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 100;
            opacity: 0.1;
        }

        /* --- 1. 角色立繪 (主體) --- */
        #character-container {
            position: absolute;
            left: -10%;
            bottom: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            display: flex;
            align-items: flex-end;
        }

        /* 使用 SVG 模擬高品質手遊角色立繪（成熟創業者風格） */
        .character-art {
            height: 95%;
            filter: drop-shadow(0 0 50px rgba(0,0,0,0.9));
            mask-image: linear-gradient(to top, transparent 5%, black 30%);
        }

        /* --- 2. HUD 頂部狀態欄 (手遊包裝感) --- */
        #hud-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 25px;
            z-index: 10;
            display: grid;
            grid-template-columns: 80px 1fr 1fr 1fr 1fr;
            gap: 12px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
        }

        .hud-module {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 6px 12px;
            backdrop-filter: blur(8px);
            position: relative;
            overflow: hidden;
        }

        .hud-module::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 3px; height: 100%;
            background: var(--gold);
        }

        .hud-label {
            font-size: 10px;
            color: var(--gold);
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .hud-value {
            font-size: 16px;
            font-weight: 800;
            margin-top: 2px;
            text-shadow: 0 0 10px var(--gold-glow);
        }

        #month-display {
            background: var(--gold);
            color: #000;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            clip-path: polygon(0% 0%, 100% 0%, 85% 100%, 0% 100%);
        }

        /* --- 3. 商業事件卡 (右側懸浮) --- */
        #event-card {
            position: absolute;
            right: 30px;
            top: 110px;
            width: 340px;
            z-index: 5;
            background: var(--panel-bg);
            border-right: 4px solid var(--gold);
            padding: 25px;
            box-shadow: -20px 20px 40px rgba(0,0,0,0.6);
            transform: perspective(1000px) rotateY(-5deg);
        }

        .event-tag {
            font-size: 11px;
            color: var(--gold-light);
            letter-spacing: 3px;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .event-title {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 15px;
            color: #fff;
            line-height: 1.2;
        }

        .event-desc {
            font-size: 15px;
            line-height: 1.6;
            color: #b0b8c4;
            margin-bottom: 10px;
        }

        /* --- 4. 對話框 (底部橫跨) --- */
        #dialogue-system {
            position: absolute;
            bottom: 160px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 900px;
            background: rgba(5, 7, 10, 0.85);
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 20px 40px;
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        #dialogue-system::after {
            content: "SYSTEM ADVISOR";
            position: absolute;
            top: -12px;
            left: 30px;
            background: var(--gold);
            color: #000;
            font-size: 11px;
            font-weight: 900;
            padding: 2px 12px;
        }

        .dialogue-text {
            font-size: 17px;
            font-style: italic;
            color: #fff;
            line-height: 1.5;
        }

        /* --- 5. 商業選擇按鈕 (底部導航感) --- */
        #action-bar {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            padding: 0 30px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            z-index: 20;
        }

        .choice-btn {
            height: 85px;
            background: linear-gradient(135deg, #1c2533 0%, #0a0e14 100%);
            border: 1px solid rgba(212, 175, 55, 0.4);
            position: relative;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .choice-btn:hover {
            transform: translateY(-8px);
            border-color: var(--gold);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3);
        }

        .choice-btn::before {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }

        .choice-btn:hover::before {
            left: 100%;
        }

        .btn-title {
            font-size: 19px;
            font-weight: 900;
            color: var(--gold);
            text-transform: uppercase;
        }

        .btn-detail {
            font-size: 11px;
            color: #8a9bb0;
            margin-top: 5px;
        }

        /* 數值浮動動畫 */
        @keyframes statPop {
            0% { transform: translateY(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-60px); opacity: 0; }
        }

        .stat-pop {
            position: fixed;
            font-weight: 900;
            z-index: 1000;
            pointer-events: none;
            animation: statPop 1s forwards;
        }

        /* 結局遮罩 */
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        #overlay h1 { font-size: 50px; color: var(--gold); letter-spacing: 5px; }
        #overlay p { font-size: 18px; margin: 20px 0 40px; color: #8a9bb0; }
    </style>
</head>
<body>

<div id="game-stage">
    <div id="character-container">
        <svg class="character-art" viewBox="0 0 500 800" xmlns="http://www.w3.org/2000/svg">
            <path d="M150 800 L350 800 L380 400 L340 150 Q300 50 250 50 Q200 50 160 150 L120 400 Z" fill="#0d141f" />
            <path d="M250 150 Q300 150 320 220 L340 400 L300 800 L200 800 L160 400 L180 220 Q200 150 250 150" fill="#162133" stroke="#d4af37" stroke-width="1"/>
            <circle cx="250" cy="100" r="30" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.5" />
            <rect x="245" y="150" width="10" height="200" fill="#d4af37" opacity="0.1" />
        </svg>
    </div>

    <div id="hud-top">
        <div id="month-display">M1</div>
        <div class="hud-module">
            <div class="hud-label">資產餘額</div>
            <div id="stat-cash" class="hud-value">$150,000</div>
        </div>
        <div class="hud-module">
            <div class="hud-label">月營運值</div>
            <div id="stat-pnl" class="hud-value">$20k / $45k</div>
        </div>
        <div class="hud-module">
            <div class="hud-label">決策壓力</div>
            <div id="stat-stress" class="hud-value">12%</div>
        </div>
        <div class="hud-module">
            <div class="hud-label">系統穩度</div>
            <div id="stat-stable" class="hud-value">95%</div>
        </div>
    </div>

    <div id="event-card">
        <div id="event-chapter" class="event-tag">PROTOCOL 01</div>
        <div id="event-title" class="event-title">首月策略分岔點</div>
        <div id="event-desc" class="event-desc">
            市場反響不如預期，前期研發成本過高導致現金流預警。創始人，我們必須在「活下去」與「打磨價值」間做出抉擇。
        </div>
    </div>

    <div id="dialogue-system">
        <div id="dialogue-text" class="dialogue-text">
            「別在無意義的瑣事中耗盡你的精力。在商業戰場上，平庸的決策比錯誤的決策更危險。」
        </div>
    </div>

    <div id="action-bar">
        <div class="choice-btn" onclick="applyDecision(0)">
            <div id="btn-0-title" class="btn-title">接外包代工</div>
            <div class="btn-detail">回補現金，但降低研發權重</div>
        </div>
        <div class="choice-btn" onclick="applyDecision(1)">
            <div id="btn-1-title" class="btn-title">打磨高單價</div>
            <div class="btn-detail">建立護城河，提高支出壓力</div>
        </div>
        <div class="choice-btn" onclick="applyDecision(2)">
            <div id="btn-2-title" class="btn-title">精簡人力</div>
            <div class="btn-detail">極限降本，考驗系統穩定度</div>
        </div>
    </div>
</div>

<div id="overlay">
    <h1 id="end-title">協議達成</h1>
    <p id="end-desc">你成功建立了一套可持續運行的商業模型。</p>
    <button onclick="location.reload()" style="padding: 15px 50px; background: var(--gold); border: none; font-weight: 900; cursor: pointer; color: #000;">重啟模擬</button>
</div>

<script>
    let state = {
        step: 0,
        cash: 150000,
        rev: 20000,
        exp: 45000,
        stress: 12,
        stable: 95
    };

    const scenarios = [
        {
            month: "M1",
            tag: "PROTOCOL 01: SURVIVAL",
            title: "存亡邊緣的決策",
            desc: "種子輪資金消耗過快，產品尚未產生正向收益。市場正在對我們失去耐心。",
            advisor: "「現金流是公司的血液。一旦乾涸，所有的願景都只是空談。Marcus，我們得動手了。」",
            options: [
                { title: "接外包代工", cash: 60000, stress: 15, stable: -10 },
                { title: "打磨高單價", cash: -30000, stress: 20, stable: 5 },
                { title: "精簡人力", cash: 0, stress: 25, stable: -25 }
            ]
        },
        {
            month: "M2",
            tag: "PROTOCOL 02: LEVERAGE",
            title: "產能槓桿的釋放",
            desc: "產品開始獲得訂單，但你的時間被瑣事淹沒。系統需要更強大的「槓桿」來支撐規模化。",
            advisor: "「如果你還在親自處理每一張發票，那你就不再是創始人，而是一個昂貴的文員。」",
            options: [
                { title: "啟動 AI 工具", cash: -15000, stress: -15, stable: 10 },
                { title: "建立 SOP", cash: -5000, stress: 5, stable: 20 },
                { title: "外包非核心", cash: 30000, stress: -5, stable: 5 }
            ]
        },
        {
            month: "M3",
            tag: "PROTOCOL 03: EXIT",
            title: "最終估值躍遷",
            desc: "併購要約與下一輪融資同時擺在桌面上。我們需要決定這間公司的最終形態。",
            advisor: "「這不是結束。這只是你作為創始人的第一個正式協議。選擇那個能讓你贏得未來的選項。」",
            options: [
                { title: "壓低成本求售", cash: 50000, stress: 30, stable: -20 },
                { title: "啟動品牌攻勢", cash: -80000, stress: 40, stable: 15 },
                { title: "全授權輕量化", cash: 120000, stress: -10, stable: 30 }
            ]
        }
    ];

    function updateUI() {
        if (state.step >= scenarios.length) {
            showEnd();
            return;
        }
        const s = scenarios[state.step];
        document.getElementById('month-display').innerText = s.month;
        document.getElementById('event-chapter').innerText = s.tag;
        document.getElementById('event-title').innerText = s.title;
        document.getElementById('event-desc').innerText = s.desc;
        document.getElementById('dialogue-text').innerText = s.advisor;
        
        document.getElementById('stat-cash').innerText = `$${state.cash.toLocaleString()}`;
        document.getElementById('stat-stress').innerText = `${state.stress}%`;
        document.getElementById('stat-stable').innerText = `${state.stable}%`;

        document.getElementById('btn-0-title').innerText = s.options[0].title;
        document.getElementById('btn-1-title').innerText = s.options[1].title;
        document.getElementById('btn-2-title').innerText = s.options[2].title;
    }

    function applyDecision(idx) {
        const opt = scenarios[state.step].options[idx];
        state.cash += opt.cash;
        state.stress += opt.stress;
        state.stable += opt.stable;
        
        // 簡單的狀態檢測
        if (state.cash < 0 || state.stress > 90 || state.stable < 20) {
            showEnd(true);
            return;
        }

        state.step++;
        updateUI();
    }

    function showEnd(failed = false) {
        document.getElementById('overlay').style.display = 'flex';
        if (failed) {
            document.getElementById('end-title').innerText = "協議破裂";
            document.getElementById('end-title').style.color = "var(--danger)";
            document.getElementById('end-desc').innerText = "商業模型因極限壓力而崩潰。你已出局。";
        }
    }

    updateUI();
</script>

</body>
</html>
