<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOLO VENTURE: THE CEO PROTOCOL</title>
    <style>
        :root {
            --gold: #c5a059;
            --gold-glow: rgba(197, 160, 89, 0.4);
            --deep-blue: #0a0e14;
            --ui-panel: rgba(16, 20, 28, 0.9);
            --text-main: #e0e4eb;
            --text-dim: #8a929e;
            --danger: #ff4d4d;
            --success: #00ffaa;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05070a;
            color: var(--text-main);
            font-family: var(--font-family);
            -webkit-font-smoothing: antialiased;
        }

        /* Cinematic Background */
        #stage {
            position: relative;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 30%, #1a2230 0%, #05070a 100%);
            display: flex;
            flex-direction: column;
        }

        #stage::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3C%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
        }

        /* --- Character Illustration Area --- */
        #character-layer {
            position: absolute;
            bottom: 0;
            left: -5%;
            width: 85vh;
            height: 90vh;
            z-index: 1;
            pointer-events: none;
            /* Stylized Mature Professional Silhouette/Portrait */
            background: 
                linear-gradient(to top, #05070a 5%, transparent 40%),
                radial-gradient(ellipse at 50% 40%, rgba(197, 160, 89, 0.15) 0%, transparent 70%),
                conic-gradient(from 180deg at 50% 30%, #0f141a, #1a2230, #0f141a);
            mask-image: linear-gradient(to right, black 70%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, black 70%, transparent 100%);
            clip-path: polygon(0 0, 100% 0, 85% 100%, 0% 100%);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Character Details (Abstract High-End) */
        #character-layer::after {
            content: "";
            position: absolute;
            top: 15%; left: 35%;
            width: 30%; height: 40%;
            background: radial-gradient(circle at 50% 30%, #2a3545 0%, transparent 80%);
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.5;
        }

        /* --- Top HUD --- */
        #hud {
            position: relative;
            z-index: 10;
            height: 80px;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 80px;
            gap: 10px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
        }

        .stat-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold-glow);
        }

        .stat-value.danger { color: var(--danger); text-shadow: none; }

        /* --- Main Event UI --- */
        #main-ui {
            position: relative;
            z-index: 5;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            padding-bottom: 40px;
        }

        #event-card {
            align-self: flex-end;
            width: 380px;
            background: var(--ui-panel);
            border-left: 2px solid var(--gold);
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            box-shadow: -10px 10px 30px rgba(0,0,0,0.5);
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .chapter-tag {
            color: var(--gold);
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
        }

        .event-title {
            font-size: 20px;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .event-desc {
            font-size: 14px;
            color: var(--text-dim);
            line-height: 1.6;
        }

        /* --- Dialogue --- */
        #dialogue-wrapper {
            width: 100%;
            max-width: 700px;
            margin: 0 auto 20px 20%;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            min-height: 80px;
        }

        #speaker {
            font-size: 12px;
            color: var(--gold);
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        #text-content {
            font-size: 15px;
            line-height: 1.5;
            font-style: italic;
        }

        /* --- Action Controls --- */
        #action-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        .btn-action {
            flex: 1;
            height: 60px;
            background: linear-gradient(135deg, #1a2230 0%, #0f141a 100%);
            border: 1px solid rgba(197, 160, 89, 0.3);
            color: white;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .btn-action:hover {
            border-color: var(--gold);
            background: linear-gradient(135deg, #252e3d 0%, #1a2230 100%);
        }

        .btn-action:active {
            transform: scale(0.96);
            background: var(--gold);
            color: black;
        }

        .btn-label { font-size: 16px; font-weight: bold; }
        .btn-sub { font-size: 9px; opacity: 0.6; text-transform: uppercase; margin-top: 2px; }

        /* --- Feedback Modal --- */
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        #report-card {
            background: #111;
            border: 1px solid var(--gold);
            width: 100%;
            max-width: 450px;
            padding: 30px;
            text-align: center;
        }

        .report-header { font-size: 24px; color: var(--gold); margin-bottom: 20px; }
        .report-stat { display: flex; justify-content: space-between; margin: 10px 0; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .report-btn { 
            margin-top: 30px; 
            width: 100%; 
            padding: 15px; 
            background: var(--gold); 
            color: black; 
            border: none; 
            font-weight: bold;
            cursor: pointer;
        }

        /* --- Responsive Tweaks --- */
        @media (max-width: 768px) {
            #hud { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; height: auto; }
            #event-card { width: 100%; }
            #character-layer { opacity: 0.3; left: -20%; }
            #dialogue-wrapper { margin-left: 0; }
            #action-grid { flex-direction: column; }
        }
    </style>
</head>
<body>

<div id="stage">
    <div id="character-layer"></div>

    <div id="hud">
        <div class="stat-box">
            <div class="stat-label">現值營收 / 支出</div>
            <div id="cash-stat" class="stat-value">$125,000 / $80,000</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">決策壓力</div>
            <div id="stress-stat" class="stat-value">22%</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">系統穩定度</div>
            <div id="stable-stat" class="stat-value">92%</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">剩餘資源</div>
            <div id="intel-stat" class="stat-value">12 Units</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">月份</div>
            <div id="month-stat" class="stat-value" style="color:white">M1</div>
        </div>
    </div>

    <main id="main-ui">
        <div id="event-card">
            <span id="chapter-label" class="chapter-tag">CHAPTER 01: THE SURVIVAL GAP</span>
            <h2 id="event-title" class="event-title">現金流斷裂危機</h2>
            <p id="event-desc" class="event-desc">
                初期研發投入過高，帳面餘額僅夠支撐兩個月。目前有三個方向可以調整。你打算如何分配下一階段的精力？
            </p>
        </div>

        <div id="dialogue-wrapper">
            <div id="speaker">顧問 Marcus</div>
            <div id="text-content">「我們需要一口氣，不論是錢還是時間。在這個階段，活下去比美譽度更重要。」</div>
        </div>

        <div id="action-grid">
            <button class="btn-action" onclick="makeChoice(0)">
                <span id="btn-0-title" class="btn-label">接低價短案</span>
                <span class="btn-sub">快速補血 / 壓力增加</span>
            </button>
            <button class="btn-action" onclick="makeChoice(1)">
                <span id="btn-1-title" class="btn-label">升級高價報價包</span>
                <span class="btn-sub">品牌溢價 / 週期較長</span>
            </button>
            <button class="btn-action" onclick="makeChoice(2)">
                <span id="btn-2-title" class="btn-label">縮減固定支出</span>
                <span class="btn-sub">穩定度下降 / 換取時間</span>
            </button>
        </div>
    </main>

    <div id="overlay">
        <div id="report-card">
            <h1 id="modal-title" class="report-header">決策回饋</h1>
            <div id="modal-content">
                </div>
            <button class="report-btn" onclick="closeModal()">確認並執行下一步</button>
        </div>
    </div>
</div>

<script>
    // --- Data Configuration ---
    const chapters = [
        {
            month: "M1",
            label: "CHAPTER 01: 現金流與生存",
            title: "首月的策略分歧點",
            desc: "市場反響不如預期，你必須在「現金」與「價值」間做出抉擇。團隊正在等待你的指示。",
            speaker: "Marcus",
            dialogue: "「記住，創始人的體力也是一種成本，別在沒意義的磨合中耗盡它。」",
            options: [
                { title: "接低價代工", sub: "補足短期現金", cash: 50000, stress: 15, stable: -5, msg: "獲得急救金，但你正陷入低價值勞動的陷阱。" },
                { title: "磨合高單價產品", sub: "建立毛利護城河", cash: -20000, stress: 5, stable: 10, msg: "品牌力提升，但現金流變得非常緊繃。" },
                { title: "暫停所有研發", sub: "砍掉固定支出", cash: 10000, stress: -10, stable: -20, msg: "壓力減輕，但你的產品研發進度已經停滯。" }
            ]
        },
        {
            month: "M2",
            label: "CHAPTER 02: 規模化與槓桿",
            title: "產能瓶頸出現",
            desc: "訂單開始進來了，但你的時間被瑣事塞滿。你需要引進「槓桿」來解放生產力。",
            speaker: "Marcus",
            dialogue: "「你自己做確實最完美，但你打算一輩子只做這幾件嗎？」",
            options: [
                { title: "啟動 AI 流程", sub: "自動化工作流", cash: -30000, stress: -5, stable: 25, msg: "生產力大幅釋放，系統穩定度顯著上升。" },
                { title: "外包部分產能", sub: "購買他人時間", cash: -15000, stress: -10, stable: 5, msg: "你換取了決策空間，但成本結構開始變重。" },
                { title: "維持單人模式", sub: "極致利潤化", cash: 40000, stress: 30, stable: -10, msg: "利潤極高，但你的心理健康值已瀕臨臨界點。" }
            ]
        },
        {
            month: "M3",
            label: "CHAPTER 03: 商業終局之戰",
            title: "品牌 vs 通路",
            desc: "產品成熟了。現在要決定是深耕自有品牌，還是快速鋪設通路擴大規模？",
            speaker: "Marcus",
            dialogue: "「這是最後一跳。要當隱形冠軍，還是要成為市場焦點？」",
            options: [
                { title: "重金砸品牌", sub: "長期溢價策略", cash: -60000, stress: 20, stable: 15, msg: "你贏得了市場尊重，未來擁有極強的報價權。" },
                { title: "主攻通路分潤", sub: "換取市佔率", cash: 80000, stress: 5, stable: -5, msg: "現金爆發，你成功建立了一台賺錢機器。" },
                { title: "建立 SOP 授權", sub: "商業模式輕量化", cash: 30000, stress: -15, stable: 30, msg: "你成功脫離了勞動，轉向資本與智力授權模式。" }
            ]
        }
    ];

    // --- State Manager ---
    let currentStep = 0;
    let stats = {
        cash: 125000,
        stress: 22,
        stable: 92,
        intel: 12
    };

    function updateUI() {
        // Stats
        document.getElementById('cash-stat').innerText = `$${stats.cash.toLocaleString()} / $80,000`;
        document.getElementById('stress-stat').innerText = `${stats.stress}%`;
        document.getElementById('stable-stat').innerText = `${stats.stable}%`;
        document.getElementById('month-stat').innerText = chapters[currentStep]?.month || "END";

        // Stress visual warning
        document.getElementById('stress-stat').className = stats.stress > 60 ? 'stat-value danger' : 'stat-value';

        // Content
        if (currentStep < chapters.length) {
            const data = chapters[currentStep];
            document.getElementById('chapter-label').innerText = data.label;
            document.getElementById('event-title').innerText = data.title;
            document.getElementById('event-desc').innerText = data.desc;
            document.getElementById('speaker').innerText = `顧問 ${data.speaker}`;
            document.getElementById('text-content').innerText = data.dialogue;

            // Buttons
            for (let i = 0; i < 3; i++) {
                document.getElementById(`btn-${i}-title`).innerText = data.options[i].title;
                document.querySelector(`#action-grid button:nth-child(${i+1}) .btn-sub`).innerText = data.options[i].sub;
            }
        }
    }

    function makeChoice(idx) {
        const option = chapters[currentStep].options[idx];
        
        // Apply Changes
        stats.cash += option.cash;
        stats.stress += option.stress;
        stats.stable += option.stable;

        // Show Modal
        const modal = document.getElementById('overlay');
        const content = document.getElementById('modal-content');
        content.innerHTML = `
            <p style="margin-bottom:20px; line-height:1.6;">${option.msg}</p>
            <div class="report-stat"><span>現金流變動</span><span style="color:${option.cash > 0 ? 'var(--success)' : 'var(--danger)'}">${option.cash > 0 ? '+' : ''}${option.cash}</span></div>
            <div class="report-stat"><span>壓力增減</span><span style="color:var(--gold)">${option.stress > 0 ? '+' : ''}${option.stress}%</span></div>
            <div class="report-stat"><span>穩定度影響</span><span style="color:var(--success)">${option.stable > 0 ? '+' : ''}${option.stable}%</span></div>
        `;
        modal.style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('overlay').style.display = 'none';
        currentStep++;
        
        if (currentStep >= chapters.length) {
            showFinalReport();
        } else {
            updateUI();
        }
    }

    function showFinalReport() {
        const modal = document.getElementById('overlay');
        const title = document.getElementById('modal-title');
        const content = document.getElementById('modal-content');
        
        title.innerText = "季度經營結算";
        let rating = stats.cash > 200000 ? "S+ 卓越企業家" : (stats.cash > 100000 ? "A 穩定經營者" : "C 生存邊緣人");
        
        content.innerHTML = `
            <h2 style="color:white; margin-bottom:20px;">${rating}</h2>
            <div class="report-stat"><span>最終資產</span><span style="color:var(--gold)">$${stats.cash.toLocaleString()}</span></div>
            <div class="report-stat"><span>身心磨損</span><span>${stats.stress}%</span></div>
            <div class="report-stat"><span>架構完整性</span><span>${stats.stable}%</span></div>
            <p style="margin-top:20px; font-size:12px; color:var(--text-dim)">你在本季度的決策決定了下一輪融資的起點。</p>
        `;
        
        const btn = document.querySelector('.report-btn');
        btn.innerText = "重新開始模擬";
        btn.onclick = () => location.reload();
        modal.style.display = 'flex';
    }

    // Init
    updateUI();
</script>

</body>
</html>
