<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THE FOUNDER: STRATEGY PROTOCOL</title>
    <style>
        :root {
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.4);
            --dark-bg: #05070a;
            --panel-bg: rgba(10, 15, 25, 0.9);
            --text-main: #e0e6ed;
            --text-dim: #8a9bb0;
            --accent-blue: #007aff;
            --danger: #ff3b30;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--dark-bg);
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
        }

        /* 手遊主畫面背景：深藍黑色漸層 + 科技感底紋 */
        #game-stage {
            position: relative;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 30%, #1a253a 0%, #05070a 100%);
            display: flex;
            flex-direction: column;
        }

        #game-stage::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* --- 1. 成熟角色立繪 (CEO/Founder) --- */
        #character-viewport {
            position: absolute;
            left: -10%;
            bottom: 0;
            width: 90%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* 使用 CSS 繪製一個具有手遊感的成熟 CEO 輪廓，確保畫面不空 */
        .character-silhouette {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 95%;
            background: 
                linear-gradient(to top, #05070a 5%, transparent 40%),
                radial-gradient(ellipse at 50% 30%, rgba(212,175,55,0.1) 0%, transparent 70%),
                conic-gradient(from 180deg at 50% 40%, #1c2533 0deg, #2a374a 60deg, #1c2533 120deg);
            clip-path: polygon(20% 100%, 30% 40%, 45% 20%, 55% 20%, 70% 40%, 80% 100%);
            filter: drop-shadow(0 0 30px rgba(0,0,0,0.8));
        }

        /* --- 2. 手遊感 HUD (Top Bar) --- */
        #hud-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 85px;
            z-index: 10;
            padding: 10px 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr) 80px;
            gap: 10px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
        }

        .hud-cell {
            background: rgba(255,255,255,0.05);
            border-left: 2px solid var(--gold);
            padding: 5px 10px;
            backdrop-filter: blur(10px);
        }

        .hud-label {
            font-size: 10px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .hud-value {
            font-size: 16px;
            font-weight: 800;
            margin-top: 2px;
        }

        #month-tag {
            background: var(--gold);
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 20px;
            clip-path: polygon(0 0, 100% 0, 85% 100%, 15% 100%);
        }

        /* --- 3. 商業事件卡 (Right Side) --- */
        #event-anchor {
            position: absolute;
            right: 20px;
            top: 100px;
            width: 320px;
            z-index: 5;
        }

        .event-card {
            background: var(--panel-bg);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-right: 4px solid var(--gold);
            box-shadow: -10px 10px 30px rgba(0,0,0,0.5);
            transform: skewX(-2deg);
        }

        .event-chapter {
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .event-title {
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--gold-glow);
            padding-bottom: 8px;
        }

        .event-body {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-dim);
        }

        /* --- 4. 對話框 (Bottom Center) --- */
        #dialogue-area {
            position: absolute;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            background: rgba(0,0,0,0.85);
            border: 1px solid var(--gold-glow);
            padding: 20px 30px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        #dialogue-area::before {
            content: "ADVISOR";
            position: absolute;
            top: -22px;
            left: 20px;
            background: var(--gold);
            color: #000;
            font-size: 12px;
            font-weight: 900;
            padding: 2px 10px;
        }

        .dialogue-text {
            font-size: 16px;
            font-style: italic;
            line-height: 1.4;
            color: var(--text-main);
        }

        /* --- 5. 大型遊戲感按鈕 (Bottom Action Bar) --- */
        #action-bar {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            height: 90px;
            z-index: 20;
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 0 20px;
        }

        .strategy-btn {
            flex: 1;
            max-width: 260px;
            height: 70px;
            background: linear-gradient(135deg, #1c2533 0%, #0a0e14 100%);
            border: 1px solid var(--gold-glow);
            position: relative;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
            overflow: hidden;
        }

        .strategy-btn::before {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.4s;
        }

        .strategy-btn:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
            box-shadow: 0 5px 20px var(--gold-glow);
        }

        .strategy-btn:hover::before {
            left: 100%;
        }

        .btn-label {
            font-size: 18px;
            font-weight: 900;
            color: var(--gold);
            text-transform: uppercase;
        }

        .btn-sub {
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* 數值浮動動畫 */
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }

        .stat-change {
            position: fixed;
            font-weight: bold;
            z-index: 100;
            pointer-events: none;
            animation: floatUp 1.2s forwards;
        }

        /* 結算畫面 */
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #overlay h1 { font-size: 60px; color: var(--gold); margin-bottom: 20px; }
        #overlay p { font-size: 20px; margin-bottom: 40px; color: var(--text-dim); }
    </style>
</head>
<body>

<div id="game-stage">
    <div id="character-viewport">
        <div class="character-silhouette"></div>
    </div>

    <div id="hud-header">
        <div class="hud-cell">
            <div class="hud-label">目標現金流</div>
            <div id="val-target" class="hud-value">$250,000</div>
        </div>
        <div class="hud-cell">
            <div class="hud-label">目前營收 / 支出</div>
            <div id="val-pnl" class="hud-value">$120k / $45k</div>
        </div>
        <div class="hud-cell">
            <div class="hud-label">決策壓力</div>
            <div id="val-stress" class="hud-value">15%</div>
        </div>
        <div class="hud-cell">
            <div class="hud-label">系統穩定度</div>
            <div id="val-stable" class="hud-value">92%</div>
        </div>
        <div id="month-tag">M1</div>
    </div>

    <div id="event-anchor">
        <div class="event-card">
            <div id="event-chapter" class="event-chapter">CHAPTER 01</div>
            <div id="event-title" class="event-title">首月策略分岔點</div>
            <div id="event-desc" class="event-body">
                市場反應不如預期，研發投入過高導致帳面餘額緊迫。Marcus，我們必須在現金流與產品價值間做出斷捨離。
            </div>
        </div>
    </div>

    <div id="dialogue-area">
        <div id="dialogue-text" class="dialogue-text">
            「創始人的體力也是一種成本。別在無意義的磨合中耗盡它。先活下來，再談改變世界。」
        </div>
    </div>

    <div id="action-bar">
        <div class="strategy-btn" onclick="applyDecision(0)">
            <div id="btn-0-title" class="btn-label">接外包代工</div>
            <div class="btn-sub">短期回血，但犧牲研發速度</div>
        </div>
        <div class="strategy-btn" onclick="applyDecision(1)">
            <div id="btn-1-title" class="btn-label">打磨高單價產品</div>
            <div class="btn-sub">提升品牌壁壘，增加支出壓力</div>
        </div>
        <div class="strategy-btn" onclick="applyDecision(2)">
            <div id="btn-2-title" class="btn-label">精簡團隊支出</div>
            <div class="btn-sub">壓低固定成本，系統穩定度下降</div>
        </div>
    </div>
</div>

<div id="overlay">
    <h1 id="end-title">協議達成</h1>
    <p id="end-desc">你成功在壓力中建立了一套自動運行的商業系統。</p>
    <button onclick="location.reload()" style="padding: 15px 40px; background: var(--gold); border: none; font-weight: 900; cursor: pointer;">重啟模擬</button>
</div>

<script>
    let state = {
        step: 0,
        cash: 120000,
        burn: 45000,
        stress: 15,
        stable: 92,
        target: 250000
    };

    const scenarios = [
        {
            month: "M1",
            chapter: "CHAPTER 01: SURVIVAL",
            title: "首月策略分岔點",
            desc: "市場反應不如預期，研發投入過高導致帳面餘額緊迫。我們必須在現金流與產品價值間做出斷捨離。",
            advisor: "「創始人的體力也是一種成本。別在無意義的磨合中耗盡它。先活下來，再談改變世界。」",
            options: [
                { title: "接外包代工", cash: 50000, burn: -5000, stress: 15, stable: -10 },
                { title: "打磨高單價產品", cash: -20000, burn: 10000, stress: 20, stable: 5 },
                { title: "精簡團隊支出", cash: 0, burn: -15000, stress: 25, stable: -20 }
            ]
        },
        {
            month: "M2",
            chapter: "CHAPTER 02: SCALE",
            title: "效率與槓桿",
            desc: "訂單開始穩定，但 CEO 的時間變成最大瓶頸。瑣事正在摧毀戰略思考空間。該如何釋放槓桿？",
            advisor: "「如果你不建立系統，你只是給自己買了一份更辛苦的工作。我們需要 SOP。」",
            options: [
                { title: "啟動 AI 工具", cash: -10000, burn: 2000, stress: -15, stable: 10 },
                { title: "建立 SOP 流程", cash: 0, burn: 5000, stress: 10, stable: 20 },
                { title: "外包非核心產能", cash: 20000, burn: 15000, stress: -5, stability: 5 }
            ]
        },
        {
            month: "M3",
            chapter: "CHAPTER 03: THE ENDGAME",
            title: "最終估值跳板",
            desc: "融資窗口即將開啟。投資人更看重你的利潤率還是市佔率？這將決定下一階段的商業身份。",
            advisor: "「最後一跳，Marcus。選擇那個能讓你晚上睡得著覺的數字。」",
            options: [
                { title: "全面壓低成本", cash: 30000, burn: -20000, stress: 20, stable: -15 },
                { title: "啟動通路增長", cash: 80000, burn: 40000, stress: 30, stable: 5 },
                { title: "授權核心技術", cash: 100000, burn: -10000, stress: -10, stable: 20 }
            ]
        }
    ];

    function updateUI() {
        if (state.step >= scenarios.length) {
            showEnd();
            return;
        }
        const s = scenarios[state.step];
        document.getElementById('month-tag').innerText = s.month;
        document.getElementById('event-chapter').innerText = s.chapter;
        document.getElementById('event-title').innerText = s.title;
        document.getElementById('event-desc').innerText = s.desc;
        document.getElementById('dialogue-text').innerText = s.advisor;
        document.getElementById('val-pnl').innerText = `$${state.cash / 1000}k / $${state.burn / 1000}k`;
        document.getElementById('val-stress').innerText = `${state.stress}%`;
        document.getElementById('val-stable').innerText = `${state.stable}%`;

        document.getElementById('btn-0-title').innerText = s.options[0].title;
        document.getElementById('btn-1-title').innerText = s.options[1].title;
        document.getElementById('btn-2-title').innerText = s.options[2].title;
    }

    function applyDecision(idx) {
        const opt = scenarios[state.step].options[idx];
        state.cash += opt.cash;
        state.burn += opt.burn;
        state.stress += opt.stress;
        state.stable += opt.stable;
        
        state.step++;
        updateUI();
        
        if (state.stress > 80 || state.stable < 30 || state.cash < 0) {
            showEnd(true);
        }
    }

    function showEnd(failed = false) {
        document.getElementById('overlay').style.display = 'flex';
        if (failed) {
            document.getElementById('end-title').innerText = "系統崩潰";
            document.getElementById('end-title').style.color = "var(--danger)";
            document.getElementById('end-desc').innerText = "決策壓力過大或穩定度過低，商業體已瓦解。";
        }
    }

    updateUI();
</script>

</body>
</html>
