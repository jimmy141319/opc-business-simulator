<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Pathfinder｜實戰導航</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app" class="app">
    <header class="topbar">
      <div class="brand-wrap">
        <div class="brand-mark">PF</div>
        <div>
          <div class="brand-title">Pathfinder｜實戰導航</div>
          <div class="brand-sub">從失業當天開始，找回第一條可行收入路</div>
        </div>
      </div>
      <button id="resetBtn" class="top-btn hidden">重開這一局</button>
    </header>
    <section id="hud" class="hud hidden">
      <div class="hud-card"><div class="hud-label">目標現金流</div><div id="hudTarget" class="hud-value">NT$50,000</div></div>
      <div class="hud-card"><div class="hud-label">月數</div><div id="hudMonth" class="hud-value">0 / 3</div></div>
      <div class="hud-card"><div class="hud-label">目前現金流</div><div id="hudCash" class="hud-value">NT$20,000</div></div>
      <div class="hud-card"><div class="hud-label">差距</div><div id="hudGap" class="hud-value">NT$30,000</div></div>
    </section>
    <main id="screen" class="screen"></main>
  </div>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
